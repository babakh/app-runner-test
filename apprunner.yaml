version: 1.0
runtime: python311
build:
  commands:
    build:
      - python3 -m pip install --no-cache-dir -r requirements.txt
    post-build:
      - python3 -c "import gunicorn, flask, server; print('imports ok')"
run:
  command: python3 -m gunicorn --bind 0.0.0.0:8080 server:app
  network:
    port: 8080
  env:
    - name: PORT
      value: "8080"